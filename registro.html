<!DOCTYPE html> <!-- Indica que el documento está escrito en HTML5 -->
<html lang="es"> <!-- Define que el idioma principal del contenido es español -->
<head>
  <meta charset="UTF-8"> <!-- Codificación de caracteres UTF-8 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Hace que la página sea responsiva en móviles -->
  <title>Guardian Go 24/7 - Registro de Usuario</title> <!-- Título que aparece en la pestaña del navegador -->
  <link rel="stylesheet" href="styles.css"> <!-- Vincula el archivo externo de estilos CSS -->
</head>
<body>
  <!-- Encabezado con fondo curvo y logo -->
  <div class="header-curve-bg">
    <div class="brand-logo-wrapper">
      <img src="logo.png" alt="Logo oficial de Guardian Go 24/7" class="main-logo-img"> <!-- Imagen del logo -->
    </div>
  </div>

  <!-- Elementos decorativos tipo burbuja -->
  <div class="bubble bubble-1" aria-hidden="true"></div>
  <div class="bubble bubble-2" aria-hidden="true"></div>
  <div class="bubble bubble-3" aria-hidden="true"></div>

  <!-- Contenido principal -->
  <main class="main-auth">
    <div class="auth-container"> <!-- Contenedor del formulario de registro -->
      <h2 class="welcome-title">Crea tu cuenta</h2> <!-- Título de la sección -->

      <!-- Formulario de registro -->
      <form id="registerForm" novalidate> <!-- novalidate desactiva la validación automática del navegador -->
        
        <!-- Campo: Nombre completo -->
        <div class="form-group">
          <label for="fullName">Nombre Completo</label>
          <div class="input-with-icon">
            <span class="input-icon" aria-hidden="true">👤</span> <!-- Icono decorativo -->
            <input type="text" id="fullName" placeholder="Ingresa tu nombre completo" aria-label="Ingresa tu nombre completo" required> <!-- Campo obligatorio -->
          </div>
          <div class="error-message" id="nameError" role="alert"></div> <!-- Mensaje de error para el nombre -->
        </div>

        <!-- Campo: Correo electrónico -->
        <div class="form-group">
          <label for="regEmail">Correo Electrónico</label>
          <div class="input-with-icon">
            <span class="input-icon" aria-hidden="true">✉️</span> <!-- Icono decorativo -->
            <input type="email" id="regEmail" placeholder="hola@gmail.com" aria-label="Ingresa tu correo electrónico de registro" required> <!-- Campo obligatorio tipo email -->
          </div>
          <div class="error-message" id="regEmailError" role="alert"></div> <!-- Mensaje de error para el correo -->
        </div>

        <!-- Campo: Selección de rol -->
        <div class="form-group">
          <label for="userRole">Tipo de Usuario (Rol)</label>
          <div class="input-with-icon">
            <span class="input-icon" aria-hidden="true">💼</span> <!-- Icono decorativo -->
            <select id="userRole" aria-label="Selecciona tu rol en la plataforma" required> <!-- Menú desplegable obligatorio -->
              <option value="" disabled selected>Selecciona tu rol...</option> <!-- Opción inicial deshabilitada -->
              <option value="anfitrion">Anfitrión (Solicito cuidado para mi hogar/mascota)</option>
              <option value="cuidador">Cuidador (Ofrezco mis servicios de cuidado)</option>
            </select>
          </div>
          <div class="error-message" id="roleError" role="alert"></div> <!-- Mensaje de error para el rol -->
        </div>

        <!-- Campo: Contraseña -->
        <div class="form-group">
          <label for="regPassword">Contraseña (Mínimo 6 caracteres)</label>
          <div class="input-with-icon">
            <span class="input-icon" aria-hidden="true">🔑</span> <!-- Icono decorativo -->
            <input type="password" id="regPassword" placeholder="Contraseña" aria-label="Crea tu contraseña" required> <!-- Campo obligatorio tipo contraseña -->
          </div>
          <div class="error-message" id="regPasswordError" role="alert"></div> <!-- Mensaje de error para la contraseña -->
        </div>

        <!-- Botón de envío -->
        <button type="submit" class="btn-submit" aria-label="Registrar nueva cuenta en Guardian Go">Registrarse</button>
      </form>

      <!-- Enlace para cambiar a inicio de sesión -->
      <div class="auth-switch">
        <p>¿Ya tienes una cuenta? <a href="index.html">Inicia sesión aquí</a></p>
      </div>
    </div>
  </main>

  <!-- Pie de página -->
  <footer>
    <p>&copy; 2026 Guardian Go 24/7. Proyecto desarrollado por Thomas Cortes y Tatiana Herrera | Ficha 3186631</p>
  </footer>

  <!-- Archivo JavaScript externo -->
  <script src="script.js"></script>
</body>
</html>
